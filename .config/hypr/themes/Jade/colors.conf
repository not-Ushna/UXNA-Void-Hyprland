# ============================================================
# Jade Theme — Color Palette (Osaka-Jade inspired)
# ============================================================
# Deep jade greens, dark teal, gold/pink accents.
# Derived from Omarchy's osaka-jade colors.toml

$color0  = rgba(111C18ff)   # background — very dark green-black
$color1  = rgba(509475ff)   # accent — jade green (active borders)
$color2  = rgba(549E6Aff)   # bright green
$color3  = rgba(459451ff)   # medium green
$color4  = rgba(D7C995ff)   # gold / cursor
$color5  = rgba(D2689Cff)   # pink / magenta accent
$color6  = rgba(2DD5B7ff)   # cyan / teal
$color7  = rgba(F6F5DDff)   # white
$color8  = rgba(23372Bff)   # dark surface
$color9  = rgba(FF5345ff)   # red
$color10 = rgba(63B07Aff)   # bright green alt
$color11 = rgba(E5C736ff)   # yellow / gold
$color12 = rgba(ACD4CFff)   # light teal
$color13 = rgba(75BBB3ff)   # muted teal
$color14 = rgba(8CD3CBff)   # light cyan
$color15 = rgba(C1C497ff)   # foreground text

$font      = JetBrains Mono Nerd Font
$rounding  = 0
$wallpaper = ~/.config/hypr/themes/current/wallpapers/main.jpg
