# ============================================================
# Lumon Theme — Color Palette (Retro Dark Corporate)
# ============================================================
# Deep Slate base, glowing Pale Cyan borders. Terminal aesthetics.

$color0  = rgba(0B1924ff)   # background — deep slate
$color1  = rgba(9FDDF2ff)   # active border — pale cyan
$color2  = rgba(112332ff)   # inactive border — muted slate
$color3  = rgba(9FDDF2ff)   # text/foreground — pale cyan
$color4  = rgba(5A8A9Eff)   # muted cyan accent
$color5  = rgba(172A3Bff)   # slate grey surface
$color6  = rgba(FFFFFFff)   # pure white (if needed)
$color7  = rgba(0B1924ff)   # deep slate (alt)
$color8  = rgba(2A4858ff)   # highlight slate

$font      = "JetBrains Mono"
$rounding  = 4
$wallpaper = ~/.config/hypr/themes/current/wallpapers/main.jpg
