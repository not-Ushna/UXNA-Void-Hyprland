# -----------------------------------------------------
# Hyprland Configuration by uxna
# Themed via void-hyprland-themes
# -----------------------------------------------------

# ---- Source active theme colours ----
source = ~/.config/hypr/themes/current/colors.conf

# --- Monitors ---
monitor = eDP-1, 1920x1080@144, auto, 1.20

# --- Programs ---
$terminal     = kitty
$fileManager  = nautilus
$menu         = rofi -show drun -theme ~/.config/hypr/themes/current/rofi/launcher.rasi

# --- Autostart ---
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1 &
exec-once = swww-daemon
exec-once = sleep 0.5 && swww img $wallpaper --transition-fps 60 --transition-type any
exec-once = waybar -c ~/.config/hypr/waybar/current-layout -s ~/.config/hypr/themes/current/waybar/style.css
exec-once = dunst -conf ~/.config/hypr/themes/current/dunst/dunstrc
exec-once = nm-applet --indicator
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = blueman-applet
exec-once = swayidle -w timeout 240 '~/.config/hypr/scripts/launch-screensaver.sh' timeout 300 '~/.config/hypr/scripts/lock.sh' timeout 600 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on'
exec-once = ~/.config/hypr/scripts/smart-battery.sh
# --- Environment ---
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = PATH, $HOME/.local/bin:$PATH
env = QT_QPA_PLATFORMTHEME, qt5ct
env = MOZ_ENABLE_WAYLAND, 1

# --- General Settings ---
general {
    gaps_in             = 2
    gaps_out            = 5
    border_size         = 2
    col.active_border   = $color1
    col.inactive_border = $color8
    resize_on_border    = true
    allow_tearing       = false
    layout              = dwindle
}

# --- Decoration ---
decoration {
    rounding            = $rounding
    active_opacity      = 0.90
    inactive_opacity    = 0.70

    shadow {
        enabled         = true
        range           = 12
        render_power    = 4
        color           = rgba(00000088)
    }

    blur {
        enabled         = true
        size            = 3
        passes          = 2
        vibrancy        = 0.3
        noise           = 0.01
        contrast        = 1.1
        brightness      = 1.0
    }
}

# --- Animations ---
source = ~/.config/hypr/themes/current/animations.conf

# --- Input & Gestures ---
input {
    kb_layout       = us
    follow_mouse    = 1
    sensitivity     = 0
    touchpad {
        natural_scroll = false
        disable_while_typing = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

# --- Misc ---
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
    disable_splash_rendering = true
}

# --- Layouts ---
dwindle {
    preserve_split = true
}

master {
    new_status = master
}

# --- Window Rules ---
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nwg-look)$
windowrulev2 = float, class:^(qt5ct)$
windowrulev2 = float, class:^(qt6ct)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = fullscreen, class:^(org\.uxna\.screensaver)$
windowrulev2 = float, class:^(org\.uxna\.screensaver)$
windowrulev2 = float, class:^(scratchpad)$
windowrulev2 = size 80% 80%, class:^(scratchpad)$
windowrulev2 = center, class:^(scratchpad)$
windowrulev2 = workspace special:scratchpad, class:^(scratchpad)$

# --- Keybindings ---
$mainMod = SUPER

# Core
bind = $mainMod, Q,         killactive
bind = ALT, F4,             killactive
bind = $mainMod, Delete,    exec, hyprctl dispatch exit
bind = $mainMod, W,         togglefloating
bind = $mainMod, G,         togglegroup
bind = SHIFT, F11,          fullscreen
bind = $mainMod, L,         exec, ~/.config/hypr/scripts/lock.sh
bind = $mainMod CTRL, L,    exec, ~/.config/hypr/scripts/launch-screensaver.sh
bind = $mainMod, X,         exec, ~/.config/hypr/scripts/launch-wlogout.sh

# Focus
bind = $mainMod, left,      movefocus, l
bind = $mainMod, right,     movefocus, r
bind = $mainMod, up,        movefocus, u
bind = $mainMod, down,      movefocus, d
bind = ALT, Tab,            exec, hyprctl --batch "dispatch cyclenext ; dispatch alterzorder top"

# Move & Resize
bind = $mainMod SHIFT, right,   resizeactive, 30 0
bind = $mainMod SHIFT, left,    resizeactive, -30 0
bind = $mainMod SHIFT, up,      resizeactive, 0 -30
bind = $mainMod SHIFT, down,    resizeactive, 0 30
bindm = $mainMod, mouse:272,    movewindow
bindm = $mainMod, mouse:273,    resizewindow

# Launchers
bind = $mainMod, T,     exec, $terminal
bind = $mainMod, E,     exec, $fileManager
bind = $mainMod, C,     exec, code
bind = $mainMod, B,     exec, flatpak run app.zen_browser.zen
bind = $mainMod, K,     exec, kate
bind = $mainMod, S,       exec, spotify
bind = CTRL SHIFT, Escape, exec, btop

# Menus
bind = $mainMod, A,         exec, pkill -x rofi || $menu
bind = $mainMod, TAB,       exec, pkill -x rofi || rofi -show window -theme ~/.config/hypr/themes/current/rofi/launcher.rasi
bind = $mainMod SHIFT, E,   exec, pkill -x rofi || rofi -show filebrowser -theme ~/.config/hypr/themes/current/rofi/launcher.rasi
bind = $mainMod, N,         exec, ~/.config/hypr/scripts/network-menu.sh

# Theme & Layout switching
bind = $mainMod SHIFT, T,   exec, ~/.config/hypr/scripts/switch-theme.sh


# Clipboard history
bind = $mainMod, V,         exec, cliphist list | rofi -dmenu -theme ~/.config/hypr/themes/current/rofi/launcher.rasi | cliphist decode | wl-copy

# Multimedia
bindl = ,XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl = ,XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl = ,XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindl = ,XF86AudioPlay,         exec, playerctl play-pause
bindl = ,XF86AudioNext,         exec, playerctl next
bindl = ,XF86AudioPrev,         exec, playerctl previous
bindl = ,XF86MonBrightnessUp,   exec, brightnessctl set +10%
bindl = ,XF86MonBrightnessDown, exec, brightnessctl set 10%-

# Utilities
bind = $mainMod SHIFT, P,   exec, hyprpicker -an
bind = $mainMod, P,         exec, ~/.config/hypr/scripts/screenshot.sh
bind = ,Print,              exec, ~/.config/hypr/scripts/screenshot.sh
bind = $mainMod, Print,     exec, ~/.config/hypr/scripts/screenshot.sh full
bind = $mainMod SHIFT, D,   exec, ~/.config/hypr/scripts/focus-mode.sh

# Wallpaper & Waybar layout

bind = $mainMod ALT, left,  exec, ~/.config/hypr/scripts/switch-wallpaper.sh prev
bind = $mainMod ALT, right, exec, ~/.config/hypr/scripts/switch-wallpaper.sh next
bind = $mainMod SHIFT, W,   exec, ~/.config/hypr/scripts/switch-wallpaper.sh

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Navigation
bind = $mainMod CTRL, right, workspace, r+1
bind = $mainMod CTRL, left,  workspace, r-1
bind = $mainMod CTRL, down,  workspace, empty
bind = $mainMod SHIFT, S,    movetoworkspace, special

# Performance
bind = $mainMod, F1, exec, powerprofilesctl set power-saver
bind = $mainMod, F2, exec, powerprofilesctl set balanced
bind = $mainMod, F3, exec, powerprofilesctl set performance

# --- HyDE Additions ---
bind = $mainMod, J, togglesplit
bind = $mainMod CTRL SHIFT, left, movewindow, l
bind = $mainMod CTRL SHIFT, right, movewindow, r
bind = $mainMod CTRL SHIFT, up, movewindow, u
bind = $mainMod CTRL SHIFT, down, movewindow, d
bindm = $mainMod, Z, movewindow
bindm = $mainMod, X, resizewindow
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod ALT CTRL, right, movetoworkspace, r+1
bind = $mainMod ALT CTRL, left, movetoworkspace, r-1
bind = $mainMod ALT, T, exec, ~/.config/hypr/scripts/toggle-dropdown.sh
bind = $mainMod, slash, exec, ~/.config/hypr/scripts/keybinds-hint.sh
