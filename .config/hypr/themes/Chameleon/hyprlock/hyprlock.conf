# ============================================================
# Chameleon Theme — Hyprlock Config
# Colors injected by chameleon-chwall.sh from pywal cache.
# ============================================================

general {
    no_fade_in = false
    grace = 0
    ignore_empty_input = true
}

background {
    monitor =
    path = ~/.cache/current_wallpaper
    blur_passes = 3
    blur_size = 8
    contrast = 0.9
    brightness = 0.5
    vibrancy = 0.2
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.5
    dots_center = true
    outer_color = rgb(414868)
    inner_color = rgb(1a1b26)
    font_color = rgb(c0caf5)
    fade_on_empty = false
    placeholder_text = <span foreground="##414868">Enter Password...</span>
    hide_input = false
    check_color = rgb(7aa2f7)
    fail_color = rgb(f7768e)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb(e0af68)
    position = 0, -80
    halign = center
    valign = center
    rounding = 10
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgba(0,0,0,0.5)
}

label {
    monitor =
    text = $TIME
    color = rgb(c0caf5)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 6
    shadow_color = rgba(0,0,0,0.6)
}

label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgb(c0caf5)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 1
}

label {
    monitor =
    text = 🦎 CHAMELEON
    color = rgb(414868)
    font_size = 11
    font_family = JetBrainsMono Nerd Font
    position = 0, -160
    halign = center
    valign = center
}
