animations {
    enabled = yes

    # Aggressive mechanical MAGI curves
    bezier = magiIn, 0.05, 0.9, 0.1, 1.1
    bezier = magiOut, 0.3, -0.3, 0, 1
    bezier = magiSnap, 0.2, 1, 0, 1
    bezier = quick, 0.15, 0, 0.1, 1

    # Hyper-fast popin for windows
    animation = windows,        1, 2.5,  magiSnap, popin 60%
    animation = windowsIn,      1, 2.5,  magiIn, popin 40%
    animation = windowsOut,     1, 2.0,  magiOut, popin 20%
    
    # Sharp workspace sliding
    animation = workspaces,     1, 3.5,  magiSnap, slide
    animation = workspacesIn,   1, 3.5,  magiSnap, slide
    animation = workspacesOut,  1, 3.5,  magiSnap, slide
    
    # Instant fades
    animation = border,         1, 1.0,  quick
    animation = fade,           1, 1.5,  quick
    animation = layers,         1, 2.0,  magiSnap, fade
}
