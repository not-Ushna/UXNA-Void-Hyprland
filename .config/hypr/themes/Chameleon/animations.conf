animations {
    enabled = yes

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = corporateSmooth, 0.4, 0.0, 0.2, 1

    animation = windows,        1, 5, corporateSmooth
    animation = windowsIn,      1, 4, corporateSmooth, popin 90%
    animation = windowsOut,     1, 4, corporateSmooth, popin 90%
    animation = border,         1, 5, easeOutQuint
    animation = fade,           1, 3, corporateSmooth
    animation = workspaces,     1, 4, corporateSmooth, slide
}
