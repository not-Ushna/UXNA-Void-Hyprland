# ============================================================
# Lumon Theme — Hyprlock Config
# Clinical lock screen with blue accents and slight rounding.
# ============================================================

general {
    no_fade_in = false
    grace = 0
    ignore_empty_input = true
}

background {
    monitor =
    path = ~/.config/hypr/themes/current/wallpapers/main.jpg
    blur_passes = 4
    blur_size = 8
    contrast = 0.9
    brightness = 0.5
    vibrancy = 0.1
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.5
    dots_center = true
    outer_color = rgb(304860)
    inner_color = rgb(1B2D40)
    font_color = rgb(D6E2EE)
    fade_on_empty = false
    placeholder_text = <span foreground="##304860">Enter Password...</span>
    hide_input = false
    check_color = rgb(6FB8E3)
    fail_color = rgb(F2FCFF)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb(9DCAE5)
    position = 0, -80
    halign = center
    valign = center
    rounding = 4
    shadow_passes = 0
}

label {
    monitor =
    text = $TIME
    color = rgb(F2FCFF)
    font_size = 72
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
    shadow_color = rgb(16242D)
}

label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgb(D6E2EE)
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 1
}

label {
    monitor =
    text = LUMON INDUSTRIES
    color = rgb(304860)
    font_size = 11
    font_family = JetBrains Mono Nerd Font
    position = 0, -160
    halign = center
    valign = center
}
