# ============================================================
# Jade Theme — Hyprlock Config
# Sharp, boxy lock screen with jade accents.
# ============================================================

general {
    no_fade_in = false
    grace = 0
    ignore_empty_input = true
}

background {
    monitor =
    path = ~/.config/hypr/themes/current/wallpapers/main.jpg
    blur_passes = 3
    blur_size = 6
    contrast = 0.8
    brightness = 0.6
    vibrancy = 0.2
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.5
    dots_center = true
    outer_color = rgb(509475)
    inner_color = rgb(111C18)
    font_color = rgb(C1C497)
    fade_on_empty = false
    placeholder_text = <span foreground="##53685B">Enter Password...</span>
    hide_input = false
    check_color = rgb(549E6A)
    fail_color = rgb(FF5345)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb(E5C736)
    position = 0, -80
    halign = center
    valign = center
    rounding = 0
    shadow_passes = 0
}

label {
    monitor =
    text = $TIME
    color = rgb(D7C995)
    font_size = 72
    font_family = JetBrains Mono Nerd Font
    position = 0, 80
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgb(111C18)
}

label {
    monitor =
    text = cmd[update:3600000] date +"%A, %B %d"
    color = rgb(C1C497)
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 1
}
